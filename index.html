<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>App Nutricional</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  padding: 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

h1 {
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

input, select {
  padding: 8px;
  font-size: 13px;
}

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

th, td {
  padding: 8px;
  border: 1px solid #ddd;
}

tr:hover {
  background: #eef;
}

.bolinha {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
}

.card-detalhe {
  margin-top: 20px;
  padding: 20px;
  background: white;
  border-radius: 10px;
}

.grid-detalhe {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🍎 App Nutricional</h1>

<!-- FORM -->
<div class="grid">
<input id="nome" placeholder="Nome">
<input id="categoria" placeholder="Categoria">
<input id="porcao" placeholder="Porção">

<input id="energia_kcal" type="number" placeholder="Kcal">
<input id="carboidrato" type="number" placeholder="Carboidrato">
<input id="proteina" type="number" placeholder="Proteína">

<input id="gordura" type="number" placeholder="Gordura">
<input id="fibra" type="number" placeholder="Fibra">
<input id="colesterol" type="number" placeholder="Colesterol">

<input id="calcio" type="number" placeholder="Cálcio">
<input id="sodio" type="number" placeholder="Sódio">
<input id="magnesio" type="number" placeholder="Magnésio">
</div>

<select id="classificacao">
<option value="bom">🟢 Bom</option>
<option value="moderado">🟡 Moderado</option>
<option value="evitar">🔴 Evitar</option>
</select>

<br>

<button onclick="incluir()">Incluir</button>
<button onclick="alterar()">Alterar</button>
<button onclick="excluir()">Excluir</button>
<button onclick="carregarBase()">🔥 Base pronta</button>

<p id="status"></p>

<input id="busca" placeholder="Buscar..." onkeyup="buscar()">

<table>
<thead>
<tr>
<th></th>
<th>Nome</th>
<th>Kcal</th>
<th>Prot</th>
<th>Gord</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>

<div id="detalhe" class="card-detalhe" style="display:none;"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="app.js"></script>

</body>
</html>
