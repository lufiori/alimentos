<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>App Nutricional</title>

<style>
body {
  font-family: Arial;
  margin: 20px;
}

/* GRID DAS CATEGORIAS */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
}

.card {
  border: 1px solid #ccc;
  border-radius: 10px;
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  background: #f0f0f0;
}

/* ESCONDER TELAS */
.tela {
  display: none;
}

.ativa {
  display: block;
}

/* BOTÃO VOLTAR */
.voltar {
  margin-bottom: 15px;
  cursor: pointer;
}
</style>

</head>

<body>

<h1>🍎 App Nutricional</h1>

<!-- 🔥 TELA 1 (CATEGORIAS) -->
<div id="tela1" class="tela ativa">

  <h2>Grupos alimentares</h2>

  <div class="grid">
    <div class="card" onclick="abrirCategoria('Frutas')">🍎 Frutas</div>
    <div class="card" onclick="abrirCategoria('Legumes')">🥦 Legumes</div>
    <div class="card" onclick="abrirCategoria('Grãos')">🌾 Grãos</div>
    <div class="card" onclick="abrirCategoria('Carnes')">🍗 Carnes</div>
    <div class="card" onclick="abrirCategoria('Laticínios')">🥛 Laticínios</div>
    <div class="card" onclick="abrirCategoria('Industrializados')">🍔 Industrializados</div>
  </div>

</div>


<!-- 🔥 TELA 2 (LISTA) -->
<div id="tela2" class="tela">

  <div class="voltar" onclick="voltar()">⬅ Voltar</div>

  <h2 id="tituloCategoria"></h2>

  <input type="text" id="busca" placeholder="Buscar..." onkeyup="buscarCategoria()">

  <table border="1" width="100%">
    <thead>
      <tr>
        <th>Nome</th>
        <th>Kcal</th>
        <th>Carb</th>
        <th>Prot</th>
        <th>Gord</th>
      </tr>
    </thead>
    <tbody id="lista"></tbody>
  </table>

</div>


<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="app.js"></script>

</body>
</html>
