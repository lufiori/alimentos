<!DOCTYPE html>
<html lang="pt-br">
<link rel="stylesheet" href="style.css">

<head>
  <meta charset="UTF-8">
  <title>App de Alimentos</title>
</head>
<body>

<h1>🍎 Cadastro de Alimentos 🍎</h1>

<label>Nome do alimento:</label><br>
<input type="text" id="nome" placeholder="Ex: Banana"><br><br>

<label>Calorias (por porção):</label><br>
<input type="number" id="calorias" placeholder="Ex: 89"><br><br>

<label>Proteína (g):</label><br>
<input type="number" id="proteina" placeholder="Ex: 1.1"><br><br>

<label>Gordura (g):</label><br>
<input type="number" id="gordura" placeholder="Ex: 0.3"><br><br>

<label>Classificação:</label><br>
<select id="classificacao">
  <option value="bom">🟢 Bom (saudável)</option>
  <option value="moderado">🟡 Moderado</option>
  <option value="evitar">🔴 Evitar</option>
</select><br><br>

<button onclick="incluir()">Incluir</button>
<button onclick="alterar()">Alterar</button>
<button onclick="excluir()">Excluir</button>

  

<br><br>

<button onclick="incluir()">Incluir</button>
<button onclick="alterar()">Alterar</button>
<button onclick="excluir()">Excluir</button>

<p id="status"></p>

<h2>Consumo do Dia</h2>

<button onclick="adicionarAoDia()">Adicionar ao dia</button>

<p>Calorias: <span id="totalCalorias">0</span></p>
<p>Gordura: <span id="totalGordura">0</span></p>

<select id="classificacao">
  <option value="bom">🟢 Bom</option>
  <option value="moderado">🟡 Moderado</option>
  <option value="evitar">🔴 Evitar</option>
</select>
  
  
  <h2>Lista</h2>

  <input type="text" id="busca" placeholder="Buscar alimento..." onkeyup="buscar()">

   
      <table border="1" width="100%">
        <thead>
          <tr>
            <th>Status</th>
            <th>Nome</th>
            <th>Calorias</th>
            <th>Proteína</th>
            <th>Gordura</th>
          </tr>
        </thead>
        <tbody id="lista"></tbody>
      </table>



  
  <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="app.js"></script>

</body>
</html>
