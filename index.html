<!DOCTYPE html>
<html lang="pt-br">
<link rel="stylesheet" href="style.css">

<head>
  <meta charset="UTF-8">
  <title>App de Alimentos</title>
</head>
<body>

<h1>🍎 Cadastro de Alimentos 🍎</h1>

<input type="text" id="nome" placeholder="Nome">
<input type="number" id="calorias" placeholder="Calorias">
<input type="number" id="proteina" placeholder="Proteína">
<input type="number" id="gordura" placeholder="Gordura">

<br><br>

<button onclick="incluir()">Incluir</button>
<button onclick="alterar()">Alterar</button>
<button onclick="excluir()">Excluir</button>

<p id="status"></p>

<h2>Consumo do Dia</h2>

<button onclick="adicionarAoDia()">Adicionar ao dia</button>

<p>Calorias: <span id="totalCalorias">0</span></p>
<p>Gordura: <span id="totalGordura">0</span></p>

<select id="classificacao">
  <option value="bom">🟢 Bom</option>
  <option value="moderado">🟡 Moderado</option>
  <option value="evitar">🔴 Evitar</option>
</select>
  
  
  <h2>Lista</h2>

  <input type="text" id="busca" placeholder="Buscar alimento..." onkeyup="buscar()">

   
      <table border="1" width="100%">
        <thead>
          <tr>
            <th>Status</th>
            <th>Nome</th>
            <th>Calorias</th>
            <th>Proteína</th>
            <th>Gordura</th>
          </tr>
        </thead>
        <tbody id="lista"></tbody>
      </table>



  
  <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="app.js"></script>

</body>
</html>
