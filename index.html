<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>App de Alimentos</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .full {
      grid-column: span 2;
    }

    label {
      font-size: 13px;
      color: #555;
    }

    input, select {
      padding: 6px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🍎 App de Alimentos</h1>

  <!-- FORMULÁRIO -->
  <h2>Cadastro</h2>

  <div class="grid">

    <div class="full">
      <label>Nome:</label>
      <input type="text" id="nome">
    </div>

    <div>
      <label>Categoria:</label>
      <input type="text" id="categoria">
    </div>

    <div>
      <label>Porção:</label>
      <input type="text" id="porcao">
    </div>

  </div>

  <div class="grid-3">

    <div>
      <label>Calorias:</label>
      <input type="number" id="calorias">
    </div>

    <div>
      <label>Carboidrato:</label>
      <input type="number" id="carboidrato">
    </div>

    <div>
      <label>Proteína:</label>
      <input type="number" id="proteina">
    </div>

    <div>
      <label>Gordura:</label>
      <input type="number" id="gordura">
    </div>

    <div>
      <label>Fibra:</label>
      <input type="number" id="fibra">
    </div>

    <div>
      <label>Colesterol:</label>
      <input type="number" id="colesterol">
    </div>

  </div>

  <br>

  <label>Classificação:</label>
  <select id="classificacao">
    <option value="bom">🟢 Bom</option>
    <option value="moderado">🟡 Moderado</option>
    <option value="evitar">🔴 Evitar</option>
  </select>

  <br><br>

  <button onclick="incluir()">Incluir</button>
  <button onclick="alterar()">Alterar</button>
  <button onclick="excluir()">Excluir</button>

  <p id="status"></p>

  <!-- BUSCA -->
  <h2>Lista</h2>

  <input type="text" id="busca" placeholder="Buscar..." onkeyup="buscar()">

  <!-- TABELA -->
  <table>
    <thead>
      <tr>
        <th>Status</th>
        <th>Nome</th>
        <th>Categoria</th>
        <th>Cal</th>
        <th>Carb</th>
        <th>Prot</th>
        <th>Gord</th>
        <th>Fibra</th>
        <th>Colest</th>
        <th>Porção</th>
      </tr>
    </thead>
    <tbody id="lista"></tbody>
  </table>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="app.js"></script>

</body>
</html>
