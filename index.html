<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>App Nutricional</title>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f5f6fa;
    }

    h1 {
      text-align: center;
    }

    .container {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    input, select {
      padding: 8px;
      width: 100%;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #3498db;
      color: white;
    }

    button:hover {
      background: #2980b9;
    }

    .acoes {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tabela-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 1200px;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px;
      border: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #eee;
      position: sticky;
      top: 0;
    }

    tr:hover {
      background: #f1f1f1;
      cursor: pointer;
    }

    .bolinha {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .detalhes {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<h1>🍎 App Nutricional</h1>

<div class="container">

  <div class="grid">
    <input id="nome" placeholder="Nome">
    <input id="categoria" placeholder="Categoria">
    <input id="porcao" placeholder="Porção (100g)">

    <input id="energia_kcal" placeholder="Kcal">
    <input id="carboidrato" placeholder="Carboidrato">
    <input id="proteina" placeholder="Proteína">

    <input id="gordura" placeholder="Gordura">
    <input id="fibra" placeholder="Fibra">
    <input id="colesterol" placeholder="Colesterol">

    <input id="calcio" placeholder="Cálcio">
    <input id="sodio" placeholder="Sódio">
    <input id="magnesio" placeholder="Magnésio">
  </div>

  <br>

  <select id="classificacao">
    <option value="bom">🟢 Bom</option>
    <option value="moderado">🟡 Moderado</option>
    <option value="evitar">🔴 Evitar</option>
  </select>

  <div class="acoes">
    <button onclick="incluir()">Incluir</button>
    <button onclick="alterar()">Alterar</button>
    <button onclick="excluir()">Excluir</button>
    <button onclick="importarBaseGrande()">🚀 Carregar Base 500+</button>
    <button onclick="limparBase()">🧹 Limpar Base</button>

<button onclick="importarBase('base1.json')">🍎 Frutas</button>
<button onclick="importarBase('base2.json')">🌾 Grãos</button>
<button onclick="importarBase('base3.json')">🍗 Carnes</button>
<button onclick="importarBase('base4.json')">🥛 Laticínios</button>
<button onclick="importarBase('base5.json')">🍔 Industrializados</button>
    
  </div>

  <br>

  <input id="busca" placeholder="Buscar..." onkeyup="buscar()">

</div>

<!-- TABELA -->
<div class="container tabela-container">
  <table>
    <thead>
      <tr>
        <th></th>
        <th>Nome</th>
        <th>Categoria</th>
        <th>Kcal</th>
        <th>Carb</th>
        <th>Prot</th>
        <th>Gord</th>
        <th>Fibra</th>
        <th>Colest</th>
        <th>Cálcio</th>
        <th>Sódio</th>
        <th>Magnésio</th>
        <th>Porção</th>
      </tr>
    </thead>
    <tbody id="lista"></tbody>
  </table>
</div>

<!-- DETALHES -->
<div class="detalhes" id="detalhes">
  <h2 id="detNome">Selecione um alimento</h2>
  <p id="detInfo"></p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="app.js"></script>

</body>
</html>
